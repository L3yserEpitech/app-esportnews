services:
  # PostgreSQL Database - Local Development
  postgres:
    image: postgres:15-alpine
    container_name: esportnews-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: esportnews
    command: postgres -c shared_buffers=256MB -c max_connections=200
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-go/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ./backend-go/migrations:/migrations:ro
      - ./backend-go/initial_data:/initial_data:ro
    networks:
      - esportnews
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esportnews"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Redis Cache - Local Development
  redis:
    image: redis:7-alpine
    container_name: esportnews-cache-dev
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - esportnews
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Go Backend - Local Development
  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile.dev
    container_name: esportnews-backend-dev
    ports:
      - "4000:4000"
    environment:
      ENVIRONMENT: development
      SERVER_PORT: 4000
      SERVER_HOST: 0.0.0.0
      LOG_LEVEL: debug
      # Local Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/esportnews?sslmode=disable
      DB_MAX_CONNECTIONS: 20
      # Local Redis
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL: 300
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # External APIs
      LIQUIPEDIA_API_KEY: ${LIQUIPEDIA_API_KEY}
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_SECRET_KEY_LIVE: ${STRIPE_SECRET_KEY_LIVE}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # Email (Resend)
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      # Cloudflare R2
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME}
      CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID}
      CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY}
      CLOUDFLARE_R2_PUBLIC_URL: ${CLOUDFLARE_R2_PUBLIC_URL}
      # Upload
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE}
      UPLOAD_TIMEOUT: ${UPLOAD_TIMEOUT}
      # CORS
      CORS_ORIGINS: http://localhost:3002,http://127.0.0.1:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - esportnews
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend - Local Development
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
        - NEXT_PUBLIC_API_URL=http://localhost:4000/api
        - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: esportnews-frontend-dev
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3002
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - esportnews
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  esportnews:
    driver: bridge
