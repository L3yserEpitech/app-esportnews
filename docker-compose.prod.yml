services:
  # PostgreSQL Database - Production
  postgres:
    image: postgres:15-alpine
    container_name: esportnews-db-prod
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-esportnews}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backend-go/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esportnews"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esportnews
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache - Production
  redis:
    image: redis:7-alpine
    container_name: esportnews-cache-prod
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esportnews
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Go Backend - Production
  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: esportnews-backend-prod
    environment:
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-production}

      # Database
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-esportnews}?sslmode=disable

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Security
      JWT_SECRET: ${JWT_SECRET}

      # External APIs
      PANDASCORE_API_KEY: ${PANDASCORE_API_KEY}
      SPORTDEVS_API_KEY: ${SPORTDEVS_API_KEY:-}

      # Server Config
      SERVER_PORT: ${SERVER_PORT:-4000}
      SERVER_HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Performance
      CACHE_TTL: ${CACHE_TTL:-3600}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-50}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend-go:/app
      - /app/vendor
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - esportnews
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy - Production
  nginx:
    image: nginx:stable-alpine
    container_name: esportnews-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
    networks:
      - esportnews
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  nginx_cache:
    driver: local

networks:
  esportnews:
    driver: bridge
