services:
  # PostgreSQL Database - Production
  postgres:
    image: postgres:15-alpine
    container_name: esportnews-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: postgres -c shared_buffers=256MB -c max_connections=200
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esportnews"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - esportnews
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache - Production
  redis:
    image: redis:7-alpine
    container_name: esportnews-cache-prod
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esportnews
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Go Backend - Production
  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: esportnews-backend-prod
    labels:
      - "traefik.enable=true"
      # ROUTING : /api va ici (Accepte www et non-www)
      - "traefik.http.routers.esportnews-backend.rule=(Host(`esportnews.fr`) || Host(`www.esportnews.fr`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.esportnews-backend.entrypoints=websecure"
      - "traefik.http.routers.esportnews-backend.tls=true"
      - "traefik.http.routers.esportnews-backend.tls.certresolver=letsencrypt"
      # 🚨 PRIORITÉ HAUTE
      - "traefik.http.routers.esportnews-backend.priority=100"
      - "traefik.http.services.esportnews-backend.loadbalancer.server.port=4000"
      # 🔧 CORS : Ajouter middleware pour headers CORS
      - "traefik.http.middlewares.esportnews-cors.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,PATCH,OPTIONS"
      - "traefik.http.middlewares.esportnews-cors.headers.accesscontrolalloworiginlist=https://www.esportnews.fr,https://esportnews.fr"
      - "traefik.http.middlewares.esportnews-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.esportnews-cors.headers.accesscontrolallowheaders=Origin,Content-Type,Accept,Authorization"
      - "traefik.http.middlewares.esportnews-cors.headers.accesscontrolmaxage=3600"
      - "traefik.http.routers.esportnews-backend.middlewares=esportnews-cors@docker"
      - "traefik.docker.network=dokploy-network"
    environment:
      # On utilise les variables du .env (${VAR})
      ENVIRONMENT: ${ENVIRONMENT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      PANDASCORE_API_KEY: ${PANDASCORE_API_KEY}
      SPORTDEVS_API_KEY: ${SPORTDEVS_API_KEY}
      SERVER_PORT: 4000
      SERVER_HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL}
      CACHE_TTL: ${CACHE_TTL}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS}
      # CORS : On utilise la variable du .env ou on met le domaine par défaut
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - esportnews
      - dokploy-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Next.js Frontend - Production
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time : On injecte les valeurs du .env
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: esportnews-frontend-prod
    labels:
      - "traefik.enable=true"
      # ROUTING : Catch-all pour le reste (Accepte www et non-www)
      - "traefik.http.routers.esportnews-frontend.rule=Host(`esportnews.fr`) || Host(`www.esportnews.fr`)"
      - "traefik.http.routers.esportnews-frontend.entrypoints=websecure"
      - "traefik.http.routers.esportnews-frontend.tls=true"
      - "traefik.http.routers.esportnews-frontend.tls.certresolver=letsencrypt"
      # 🚨 PRIORITÉ BASSE
      - "traefik.http.routers.esportnews-frontend.priority=1"
      - "traefik.http.services.esportnews-frontend.loadbalancer.server.port=3002"
      - "traefik.docker.network=dokploy-network"
    environment:
      - NODE_ENV=production
      - PORT=3002
      # Runtime : On laisse le .env décider (plus de http://backend:4000 en dur)
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL} 
    depends_on:
      - backend
    networks:
      - esportnews
      - dokploy-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  esportnews:
    driver: bridge
  dokploy-network:
    external: true