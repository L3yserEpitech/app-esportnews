services:
  # PostgreSQL Database - Production
  postgres:
    image: postgres:15-alpine
    container_name: esportnews-db-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: esportnews
    command: postgres -c shared_buffers=256MB -c max_connections=200
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esportnews"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - esportnews
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache - Production
  redis:
    image: redis:7-alpine
    container_name: esportnews-cache-prod
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esportnews
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Go Backend - Production
  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: esportnews-backend-prod
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.esportnews-backend.rule=Host(`www.esportnews.fr`) && PathPrefix(`/api`)"
      - "traefik.http.routers.esportnews-backend.entrypoints=websecure"
      - "traefik.http.routers.esportnews-backend.tls=true"
      - "traefik.http.routers.esportnews-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.esportnews-backend.priority=10"
      - "traefik.http.services.esportnews-backend.loadbalancer.server.port=4000"
      - "traefik.docker.network=dokploy-network"
    environment:
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-production}

      # Database
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-esportnews}?sslmode=disable

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Security
      JWT_SECRET: ${JWT_SECRET}

      # External APIs
      PANDASCORE_API_KEY: ${PANDASCORE_API_KEY}
      SPORTDEVS_API_KEY: ${SPORTDEVS_API_KEY:-}

      # Server Config
      SERVER_PORT: ${SERVER_PORT:-4000}
      SERVER_HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Performance
      CACHE_TTL: ${CACHE_TTL:-3600}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-50}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - esportnews
      - dokploy-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Next.js Frontend - Production
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://backend:4000}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:4000/api}
        - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: esportnews-frontend-prod
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.esportnews-frontend.rule=Host(`www.esportnews.fr`)"
      - "traefik.http.routers.esportnews-frontend.entrypoints=websecure"
      - "traefik.http.routers.esportnews-frontend.tls=true"
      - "traefik.http.routers.esportnews-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.esportnews-frontend.priority=1"
      - "traefik.http.services.esportnews-frontend.loadbalancer.server.port=3002"
      - "traefik.docker.network=dokploy-network"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://backend:4000}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:4000/api}
      - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    ports:
      - "3002:3002"
    depends_on:
      - backend
    networks:
      - esportnews
      - dokploy-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  esportnews:
    driver: bridge
  dokploy-network:
    external: true
