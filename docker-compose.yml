version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "4343:4343"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4343/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./front
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped