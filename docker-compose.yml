version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4343:4343"
    environment:
      - NODE_ENV=development
      - PORT=4343
      - VERCEL_TOKEN=${VERCEL_TOKEN}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - esportnews
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - esportnews
    depends_on:
      - backend
    restart: unless-stopped

networks:
  esportnews:
    driver: bridge
