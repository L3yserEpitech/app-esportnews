# Configuration Nginx pour esportnews.fr
# Proxy HTTPS vers frontend Next.js et backend Go

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name www.esportnews.fr esportnews.fr;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$server_name$request_uri;
}

# Configuration HTTPS principale
server {
    listen 443 ssl http2;
    server_name www.esportnews.fr esportnews.fr;

    # Certificats SSL Let's Encrypt (à générer)
    ssl_certificate /etc/letsencrypt/live/www.esportnews.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.esportnews.fr/privkey.pem;

    # Configuration SSL moderne
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # Headers de sécurité renforcés
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://cdn.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.stripe.com https://api.pandascore.co https://pub-aadef8fdc55f44388929f1cafa8d7293.r2.dev; frame-src https://js.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Logs
    access_log /var/log/nginx/esportnews-access.log;
    error_log /var/log/nginx/esportnews-error.log;

    # Limite de taille d'upload (500MB pour R2)
    client_max_body_size 500M;

    # Proxy vers Backend Go (toutes les routes /api/*)
    location /api {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;

        # Headers nécessaires pour le proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts pour uploads lourds
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Désactiver le buffering pour le streaming
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Proxy vers Frontend Next.js (toutes les autres routes)
    location / {
        proxy_pass http://frontend:3002;
        proxy_http_version 1.1;

        # Headers nécessaires
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket (pour Next.js HMR en dev si nécessaire)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js static files optimization
    location /_next/static {
        proxy_pass http://frontend:3002;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}
