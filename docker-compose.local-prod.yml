# Local frontend connecting to production services (Supabase, Upstash, Railway)
# Usage: make prod

services:
  # Next.js Frontend - Local with Production Backend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        - NEXT_PUBLIC_BACKEND_URL=https://esportnews.fr
        - NEXT_PUBLIC_API_URL=https://esportnews.fr/api
        - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: esportnews-frontend-local-prod
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      # Production Backend (Railway)
      - NEXT_PUBLIC_BACKEND_URL=https://esportnews.fr
      - NEXT_PUBLIC_API_URL=https://esportnews.fr/api
      - NEXT_PUBLIC_STRIPE_PUBLIC_KEY=${NEXT_PUBLIC_STRIPE_PUBLIC_KEY}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3002
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

networks:
  default:
    driver: bridge
